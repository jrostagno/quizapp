services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: quizapp-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quizapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quizapp"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-test:
    image: postgres:16-alpine
    container_name: quizapp-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quizapp_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quizapp_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: quizapp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: quizapp-app
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-dev:5432/quizapp
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-test:5432/quizapp_test
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    container_name: quizapp-worker
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-dev:5432/quizapp
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-test:5432/quizapp_test
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
    command: arq app.notifications.worker.WorkerSettings

volumes:
  postgres-dev-data:
